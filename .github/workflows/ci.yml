name: CI

on:
  push:
    branches:
      - master
      - main
      - feat/**
  pull_request:

jobs:
  bootstrap-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run bootstrap checks
        run: bash scripts/test.sh

  system-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run system smoke test in Ubuntu container
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            ubuntu:24.04 \
            bash -lc '
              set -euo pipefail
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y sudo git curl wget ca-certificates gnupg jq lsb-release python3 python3-venv tar gzip bzip2 xz-utils unzip file
              useradd -m -s /bin/bash runner
              echo "runner ALL=(ALL) NOPASSWD:ALL" >/etc/sudoers.d/runner
              cp -a /src /home/runner/linux-setup
              chown -R runner:runner /home/runner/linux-setup
              su - runner -c "cd /home/runner/linux-setup && bash scripts/smoke-system.sh"
            '
