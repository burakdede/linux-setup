name: CI

on:
  push:
    branches:
      - master
      - main
      - feat/**
  pull_request:

jobs:
  bootstrap-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run bootstrap checks
        run: bash scripts/test.sh
