# Tmux configuration
# ~/.config/tmux/tmux.conf
#
# Requires tmux 3.1+ for XDG config dir support.
# TPM (Tmux Plugin Manager) is bootstrapped by multiplexer/multiplexer.sh.
#
# Fill in your personal customisations below; the settings here provide
# sensible defaults and proper colour support for neovim and zsh.

# ─── Prefix ───────────────────────────────────────────────────────────────────
# Change the prefix key. Common alternatives: C-a (screen style), C-Space.
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# ─── General ──────────────────────────────────────────────────────────────────
# Use zsh in new windows/panes.
set -g default-shell /bin/zsh
set -g default-command "/bin/zsh -l"
set -g history-limit 50000             # scrollback buffer
set -g base-index 1                    # start window numbering at 1
setw -g pane-base-index 1             # start pane numbering at 1
set -g renumber-windows on             # renumber when a window is closed
set -g mouse on                        # enable mouse support
set -g escape-time 10                  # reduce escape delay (important for neovim)
set -g focus-events on                 # pass focus events to terminals

# ─── Terminal colour support ──────────────────────────────────────────────────
# These settings allow neovim to render true colour correctly inside tmux.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",wezterm:RGB"

# ─── Status bar ───────────────────────────────────────────────────────────────
# Un-comment and customise your preferred status bar below.
# set -g status-position top
# set -g status-style "bg=default"
# set -g status-left  "[#S] "
# set -g status-right " %H:%M "

# ─── Vi mode ──────────────────────────────────────────────────────────────────
# setw -g mode-keys vi
# bind -T copy-mode-vi v   send-keys -X begin-selection
# bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
# bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ─── Pane splitting ───────────────────────────────────────────────────────────
# Intuitive split bindings that open in the current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── Pane navigation (vim-style) ──────────────────────────────────────────────
# Integrates with christoomey/vim-tmux-navigator plugin for seamless
# neovim ↔ tmux pane switching with the same keys.
# bind -n C-h select-pane -L
# bind -n C-j select-pane -D
# bind -n C-k select-pane -U
# bind -n C-l select-pane -R

# ─── Reload config ────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ─── Plugins (TPM) ────────────────────────────────────────────────────────────
# Add plugins here and press <prefix> + I to install.
# TPM itself is installed at ~/.tmux/plugins/tpm by multiplexer/multiplexer.sh.
#
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @plugin 'catppuccin/tmux'

# ─── TPM bootstrap (keep at the very bottom) ──────────────────────────────────
# Un-comment the line below when you start using TPM plugins.
if-shell '[ -d ~/.tmux/plugins/tpm ]' "run '~/.tmux/plugins/tpm/tpm'"
